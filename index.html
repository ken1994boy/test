<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>3D Camera Controller - Pro Version</title>
    <style>
        :root {
            --primary-purple: #6366f1;
            --outer-gray: #333333;
            --panel-bg: #ffffff;
            --content-vw: 33vw;
            --canvas-vh: 50vh;
            --controls-vh: 50vh;
            --font-size-base: 26px;
            --label-size: 22px;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: var(--outer-gray);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        #browser-content {
            width: var(--content-vw);
            height: 100vh;
            background-color: var(--panel-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
        }

        #canvas-container {
            width: 100%;
            height: var(--canvas-vh);
            background: #000;
            position: relative;
        }

        .text-output-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 94%;
            height: 120px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            padding: 15px 25px;
            border: 3px solid #ddd;
            z-index: 10;
        }

        #output-display {
            flex-grow: 1;
            font-size: var(--font-size-base);
            font-weight: bold;
            line-height: 1.5;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            border: none;
            outline: none;
            resize: none;
            color: #222;
        }

        .controls-section {
            height: var(--controls-vh);
            padding: 30px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .slider-item {
            margin-bottom: 10px;
            position: relative;
            /* 为定位度数显示做准备 */
        }

        .slider-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .label-text {
            font-size: var(--label-size);
            color: #333;
            font-weight: 800;
        }

        .reset-icon {
            cursor: pointer;
            font-size: 28px;
            color: #ccc;
        }

        .slider-track-row {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 20px;
            color: #999;
        }

        /* --- 新增：当前值显示样式 --- */
        .current-val {
            text-align: center;
            font-size: 18px;
            color: var(--primary-purple);
            font-weight: bold;
            margin-top: 5px;
        }

        input[type=range] {
            flex-grow: 1;
            height: 12px;
            -webkit-appearance: none;
            background: #eee;
            border-radius: 6px;
            transition: all 0.3s ease;
            accent-color: var(--primary-purple);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 36px;
            height: 36px;
            background: white;
            border: 5px solid var(--primary-purple);
            border-radius: 50%;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        /* --- 新增：变红的样式覆盖 --- */
        input[type=range].warning-red::-webkit-slider-thumb {
            border-color: #ff0000 !important;
        }

        input[type=range].warning-red {
            accent-color: #ff0000 !important;
        }

        .copy-icon {
            cursor: pointer;
            font-size: 40px;
            color: #aaa;
            align-self: center;
            margin-left: 15px;
        }
    </style>
</head>

<body>

    <div id="browser-content">
        <div id="canvas-container">
            <div class="text-output-container">
                <textarea id="output-display" readonly>0 0 0 0
# Logic Multiplier: 45°</textarea>
                <span class="copy-icon" onclick="copyText()">📋</span>
            </div>
        </div>

        <div class="controls-section">
            <div class="slider-item">
                <div class="slider-label-row">
                    <span class="label-text">头部朝向</span>
                    <span class="reset-icon" onclick="resetSlider('head')">↺</span>
                </div>
                <div class="slider-track-row">
                    <span>180°</span>
                    <input type="range" id="head" min="-180" max="180" step="45" value="0">
                    <span>-180°</span>
                </div>
                <div class="current-val" id="val-head">0°</div>
            </div>

            <div class="slider-item">
                <div class="slider-label-row">
                    <span class="label-text">身体朝向</span>
                    <span class="reset-icon" onclick="resetSlider('body')">↺</span>
                </div>
                <div class="slider-track-row">
                    <span>180°</span>
                    <input type="range" id="body" min="-180" max="180" step="45" value="0">
                    <span>-180°</span>
                </div>
                <div class="current-val" id="val-body">0°</div>
            </div>

            <div class="slider-item">
                <div class="slider-label-row">
                    <span class="label-text">相机水平</span>
                    <span class="reset-icon" onclick="resetSlider('camH')">↺</span>
                </div>
                <div class="slider-track-row">
                    <span>180°</span>
                    <input type="range" id="camH" min="-180" max="180" step="45" value="0">
                    <span>-180°</span>
                </div>
                <div class="current-val" id="val-camH">0°</div>
            </div>

            <div class="slider-item">
                <div class="slider-label-row">
                    <span class="label-text">相机垂直</span>
                    <span class="reset-icon" onclick="resetSlider('camV')">↺</span>
                </div>
                <div class="slider-track-row">
                    <span>-90°</span>
                    <input type="range" id="camV" min="-90" max="90" step="45" value="0">
                    <span>90°</span>
                </div>
                <div class="current-val" id="val-camV">0°</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, headCone, bodyCone, camGroup, greenBall, pinkBall, camLens, sightLine;
        const GREEN_RADIUS = 7;
        const PINK_RADIUS = 6.3;
        const CAMERA_RADIUS = 4.8;

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(15, 12, 15);
            camera.lookAt(0, -3, 0);

            scene.add(new THREE.AmbientLight(0xffffff, .5));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(10, 20, 10);
            scene.add(light);
            const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
            grid.position.y = -.05;
            scene.add(grid);

            const headGeo = new THREE.ConeGeometry(0.4, 2, 4);
            headGeo.rotateX(Math.PI / 2);
            headCone = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({ color: 0xff4040 }));
            headGeo.translate(0, 0, 1);
            headCone.position.y = 2;
            scene.add(headCone);

            const bodyGeo = new THREE.ConeGeometry(1.2, 3, 4);
            bodyGeo.rotateX(Math.PI / 2);
            bodyCone = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({ color: 0x4466ff }));
            bodyGeo.translate(0, 0, 1.5);
            bodyCone.position.y = 0.5;
            scene.add(bodyCone);

            const planeGeometry = new THREE.PlaneGeometry(4, 3);
            const planeMaterial = new THREE.MeshBasicMaterial({
                color: 0xAAAAAA,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.7
            });
            const xPlane = new THREE.Mesh(planeGeometry, planeMaterial);
            xPlane.rotation.z = Math.PI / 2;
            xPlane.position.y = 1;
            scene.add(xPlane);

            createTracks();

            camGroup = new THREE.Group();
            const camBox = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 1.0), new THREE.MeshStandardMaterial({ color: 0x555555 }));
            camBox.position.z = -0.3;
            camLens = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshStandardMaterial({ color: 0xffdd00 }));
            camLens.position.z = 0.5;
            camGroup.add(camBox, camLens);
            scene.add(camGroup);

            const lineGeometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 0)]);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffdd00, linewidth: 1 });
            sightLine = new THREE.Line(lineGeometry, lineMaterial);
            scene.add(sightLine);

            animate();
        }

        function createTracks() {
            const greenTorus = new THREE.Mesh(
                new THREE.TorusGeometry(GREEN_RADIUS, 0.1, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 0.8 })
            );
            greenTorus.rotation.x = Math.PI / 2;
            scene.add(greenTorus);
            greenTorus.position.y = .05
            greenBall = new THREE.Mesh(new THREE.SphereGeometry(0.38), new THREE.MeshBasicMaterial({ color: 0x00ffaa }));
            scene.add(greenBall);

            const pinkTorus = new THREE.Mesh(
                new THREE.TorusGeometry(PINK_RADIUS, 0.1, 16, 100, Math.PI),
                new THREE.MeshBasicMaterial({ color: 0xff66aa, transparent: true, opacity: 0.8 })
            );
            pinkTorus.rotation.x = Math.PI / 2;
            pinkTorus.rotation.y = Math.PI / 2;
            scene.add(pinkTorus);
            pinkBall = new THREE.Mesh(new THREE.SphereGeometry(0.38), new THREE.MeshBasicMaterial({ color: 0xff66aa }));
            scene.add(pinkBall);
        }

       function update() {
    // 核心逻辑修改：在这里取反以匹配操作直觉
    // 向右滑动（正值）时，我们取其负值传入渲染逻辑，使其向右转
    const hRaw = parseInt(document.getElementById('head').value);
    const bRaw = parseInt(document.getElementById('body').value);
    const cHRaw = parseInt(document.getElementById('camH').value);
    
    // 转换后的实际计算值
    const h = -hRaw; 
    const b = -bRaw;
    const cH = -cHRaw;
    
    // 相机垂直保持现状，通常向上滑（正值）对应俯视/抬高符合直觉
    const cV = parseInt(document.getElementById('camV').value);

    // --- 1. 语义方位判定逻辑 (基于取反后的物理角度) ---
    const getSemantic = (type, val) => {
        const absVal = Math.abs(val);
        const isPositive = val >= 0; 
        
        if (type === 'head') {
            if (absVal === 0) return "正面";
            if (absVal === 45) return isPositive ? "脸看左半边" : "脸看右半边";
            if (absVal === 90) return isPositive ? "脸正对左边" : "脸正对右边";
            if (absVal === 135) return isPositive ? "左边回头" : "右边回头";
            if (absVal === 180) return "正背面";
        } else if (type === 'body') {
            if (absVal === 0) return "正面";
            if (absVal === 45) return isPositive ? "身体朝左半边" : "身体朝右半边";
            if (absVal === 90) return isPositive ? "身体正对左" : "身体正对右";
            if (absVal === 135) return isPositive ? "左侧背" : "右背面";
            if (absVal === 180) return "正背面";
        }
        return "";
    };

    // --- 2. 更新 UI 文字显示 (红色标签与度数) ---
    const updateUI = (id, rawVal, finalVal) => {
        // 更新滑块下方的数字显示 (显示转换后的度数)
        const valDisplay = document.getElementById('val-' + id);
        if (valDisplay) valDisplay.innerText = finalVal + "°";

        const sliderItem = document.getElementById(id).closest('.slider-item');
        const labelText = sliderItem.querySelector('.label-text');
        let semanticSpan = labelText.querySelector('.semantic-tag');
        
        if (!semanticSpan) {
            semanticSpan = document.createElement('span');
            semanticSpan.className = 'semantic-tag';
            semanticSpan.style.color = '#e6966e';
            semanticSpan.style.marginLeft = '10px';
            semanticSpan.style.fontWeight = '800'; 
            semanticSpan.style.fontSize = 'var(--label-size)';
            labelText.appendChild(semanticSpan);
        }

        let semText = "";
        if (id === 'head' || id === 'body') {
            semText = getSemantic(id, finalVal);
        } else if (id === 'camH') {
            semText = finalVal === 0 ? "正对" : (finalVal > 0 ? "向左" : "向右");
        } else if (id === 'camV') {
            semText = finalVal === 0 ? "正对" : (finalVal > 0 ? "俯视" : "仰视");
        }
        semanticSpan.innerText = semText;
    };

    updateUI('head', hRaw, h);
    updateUI('body', bRaw, b);
    updateUI('camH', cHRaw, cH);
    updateUI('camV', cV, cV);

    // --- 3. 滑轨变红逻辑 (差值基于实际物理角度) ---
    const headSlider = document.getElementById('head');
    const bodySlider = document.getElementById('body');
    if (Math.abs(h - b) > 91) {
        headSlider.classList.add('warning-red');
        bodySlider.classList.add('warning-red');
    } else {
        headSlider.classList.remove('warning-red');
        bodySlider.classList.remove('warning-red');
    }

    // --- 4. Three.js 场景同步更新 ---
    const baseOffset = Math.PI * 2;
    headCone.rotation.y = -(h * Math.PI / 180) + baseOffset;
    bodyCone.rotation.y = -(b * Math.PI / 180) + baseOffset;
    const theta = -(cH * Math.PI / 180) + baseOffset;
    const phi = (cV * Math.PI / 180);

    camGroup.position.set(
        CAMERA_RADIUS * Math.cos(phi) * Math.sin(theta),
        CAMERA_RADIUS * Math.sin(phi),
        CAMERA_RADIUS * Math.cos(phi) * Math.cos(theta)
    );
    camGroup.lookAt(0, 0, 0);

    const lensWorldPos = new THREE.Vector3();
    camLens.getWorldPosition(lensWorldPos);
    sightLine.geometry.setFromPoints([lensWorldPos, new THREE.Vector3(0, 0, 0)]);

    greenBall.position.set(GREEN_RADIUS * Math.sin(theta), 0, GREEN_RADIUS * Math.cos(theta));
    pinkBall.position.set(0, PINK_RADIUS * Math.sin(phi), PINK_RADIUS * Math.cos(phi));

    // --- 5. 文本框输出格式 ---
    let outputParts = [];
    outputParts.push(`HIA=${h}°`);
    outputParts.push(`BIA=${b}°`);
   // 修改后的相机水平输出：保留原始符号
    if (cH !== 0) {
        outputParts.push(`θ = ${cH}°`);
    }
    // 修改后的相机垂直输出：保留原始符号
    if (cV !== 0) {
        outputParts.push(`Φ = ${cV}°`);
    }
    document.getElementById('output-display').value = outputParts.join('，');
}
        function updateLabelSemantic(id, value) {
                const sliderItem = document.getElementById(id).closest('.slider-item');
                const labelText = sliderItem.querySelector('.label-text');

                // 查找或创建语义显示容器
                let semanticSpan = labelText.querySelector('.semantic-tag');
                if (!semanticSpan) {
                    semanticSpan = document.createElement('span');
                    semanticSpan.className = 'semantic-tag';
                    semanticSpan.style.color = '#ff4d4f'; // 红色
                    semanticSpan.style.marginLeft = '10px';
                    semanticSpan.style.fontWeight = '800';              // 对应 CSS 中的 --label-size 粗细
                    semanticSpan.style.fontSize = 'var(--label-size)';  // 使用 CSS 变量同步大小
                    semanticSpan.style.fontFamily = 'inherit';          // 继承父级字体
                 
                }
                semanticSpan.innerText = getSemantic(id, value);
            }
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function resetSlider(id) {
            document.getElementById(id).value = 0;
            update();
        }

        function copyText() {
            const val = document.getElementById('output-display').value;
            navigator.clipboard.writeText(val);
        }

        window.onload = () => {
            init3D();
            document.querySelectorAll('input').forEach(i => i.oninput = update);
            update();
        };

        window.onresize = () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    </script>
</body>

</html>
